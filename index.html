<!DOCTYPE html>
<html>
<body style="background:#0c0c0c; color:#00ff00; font-family:monospace; padding:20px;">

<pre id="screen"></pre>

<script>
let contenido = [
"~",
"~",
"~",
"\"mensaje.txt\" 8L, 1C",
"",
"Te quiero muchísimo ❤️",
"",
"Si estás viendo esto...",
"es porque eres el amor de mi vida 😌",
"",
"Nunca lo olvides, pitufi <3",
"",
"¿Hacemos un plan chuli?",
"",
"~",
"~",
"-- NORMAL MODE --"
];

let i = 0;
let screen = document.getElementById("screen");

function escribir() {
    if (i < contenido.length) {
        screen.innerHTML += contenido[i] + "\n";
        i++;
        setTimeout(escribir, 250);
    }
}

escribir();
</script>

</body>
</html>
